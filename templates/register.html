<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MailPilot Pro — Créer un compte</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e; --card: #181818; --border: #2a2a2a;
      --text: #e8e8e8; --muted: #666; --blue: #3b82f6; --red: #ef4444;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 36px 32px; width: 100%; max-width: 420px;
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .logo span { font-size: 28px; }
    .logo h1 { font-size: 20px; font-weight: 700; }
    .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
    input {
      width: 100%; background: #111; border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px;
      padding: 10px 12px; outline: none; font-family: inherit; margin-bottom: 14px;
    }
    input:focus { border-color: var(--blue); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    button.btn-main {
      width: 100%; background: var(--blue); color: #fff; border: none;
      border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit; margin-top: 4px;
    }
    button.btn-main:hover { opacity: .88; }
    #erreur { color: var(--red); font-size: 13px; margin-top: 12px; text-align: center; display: none; }
    .login-link { text-align: center; margin-top: 18px; }
    .login-link a { color: var(--muted); font-size: 13px; }
    .login-link a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span>🛩️</span>
      <div><h1>MailPilot Pro</h1></div>
    </div>
    <p class="subtitle">Créez votre compte pour gérer votre boite mail avec l'IA.</p>

    <label>Votre nom *</label>
    <input type="text" id="nom" placeholder="Jean Dupont" />

    <label>Adresse Gmail à connecter *</label>
    <input type="email" id="email" placeholder="votre@gmail.com" autocomplete="email" />

    <div class="row">
      <div>
        <label>Agence / Société</label>
        <input type="text" id="agence" placeholder="Nom de l'agence" />
      </div>
      <div>
        <label>Téléphone</label>
        <input type="text" id="tel" placeholder="06 00 00 00" />
      </div>
    </div>

    <label>Ville / Zone</label>
    <input type="text" id="zone" placeholder="ex: Châtellerault" />

    <label>Mot de passe * (6 caractères min)</label>
    <input type="password" id="pwd" placeholder="Choisissez un mot de passe" />

    <label>Confirmer le mot de passe *</label>
    <input type="password" id="pwd2" placeholder="••••••••" onkeydown="if(event.key==='Enter')inscrire()" />

    <button class="btn-main" onclick="inscrire()">Créer mon compte</button>
    <p id="erreur"></p>

    <div class="login-link">
      <a href="/login">Déjà un compte ? Se connecter</a>
    </div>
  </div>

  <script>
    async function inscrire() {
      const nom   = document.getElementById('nom').value.trim();
      const email = document.getElementById('email').value.trim();
      const agence= document.getElementById('agence').value.trim();
      const tel   = document.getElementById('tel').value.trim();
      const zone  = document.getElementById('zone').value.trim();
      const pwd   = document.getElementById('pwd').value;
      const pwd2  = document.getElementById('pwd2').value;
      const err   = document.getElementById('erreur');
      err.style.display = 'none';

      if (!nom || !email || !pwd) {
        err.textContent = 'Nom, email et mot de passe sont requis';
        err.style.display = 'block';
        return;
      }
      if (pwd !== pwd2) {
        err.textContent = 'Les mots de passe ne correspondent pas';
        err.style.display = 'block';
        return;
      }

      const res  = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nom, email, agence, tel, zone, password: pwd })
      });
      const json = await res.json();
      if (json.ok) {
        window.location.href = '/dashboard';
      } else {
        err.textContent = json.message || 'Erreur lors de la création du compte';
        err.style.display = 'block';
      }
    }
  </script>
</body>
</html>
