<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/static/icon.svg" />
  <link rel="apple-touch-icon" href="/static/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MailPilot" />
  <meta name="theme-color" content="#4f6ef7" />
  <title>MailPilot — Connexion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0f1e; --card: #0d1525; --border: #1e2d4a;
      --text: #f1f5f9; --muted: #64748b; --blue: #4f6ef7; --blue2: #7c4ff8; --red: #ef4444;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 400px;
      box-shadow: 0 24px 60px rgba(0,0,0,.5);
    }
    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .logo-icon {
      width: 42px; height: 42px; background: linear-gradient(135deg, var(--blue), var(--blue2));
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0; box-shadow: 0 0 20px rgba(79,110,247,.4);
    }
    .logo h1 {
      font-size: 22px; font-weight: 800; letter-spacing: -.3px;
      background: linear-gradient(90deg, #fff 40%, var(--blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo p { font-size: 12px; color: var(--muted); margin-top: 2px; }

    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
    input {
      width: 100%; background: #060d1c; border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 14px;
      padding: 11px 14px; outline: none; font-family: inherit; margin-bottom: 16px;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(79,110,247,.15); }

    button.btn-main {
      width: 100%; background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: #fff; border: none; border-radius: 10px; padding: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
      box-shadow: 0 4px 16px rgba(79,110,247,.4); transition: all .15s;
    }
    button.btn-main:hover { transform: translateY(-1px); opacity: .92; }

    .divider { text-align: center; color: var(--muted); font-size: 12px; margin: 20px 0; }

    .btn-register {
      display: block; text-align: center; width: 100%;
      background: transparent; border: 1px solid var(--border);
      border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 600;
      color: var(--text); text-decoration: none; cursor: pointer;
      font-family: inherit; transition: all .15s;
    }
    .btn-register:hover { border-color: var(--blue); color: var(--blue); background: rgba(79,110,247,.07); }

    #erreur { color: var(--red); font-size: 13px; margin-top: 12px; text-align: center; display: none; }

    .admin-link { text-align: center; margin-top: 24px; }
    .admin-link a { color: var(--muted); font-size: 11px; text-decoration: none; transition: color .15s; }
    .admin-link a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">✉️</div>
      <div>
        <h1>MailPilot</h1>
        <p>Assistant email IA</p>
      </div>
    </div>

    <label>Adresse email</label>
    <input type="email" id="email" placeholder="votre@email.com" autocomplete="email" />

    <label>Mot de passe</label>
    <input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')connexion()" />

    <button class="btn-main" onclick="connexion()">Se connecter</button>
    <p id="erreur"></p>

    <div class="divider">— ou —</div>
    <a class="btn-register" href="/register">Créer un compte</a>

    <div class="admin-link">
      <a href="/admin">Accès administrateur</a>
    </div>
  </div>

  <script>
    async function connexion() {
      const email = document.getElementById('email').value.trim();
      const pwd   = document.getElementById('pwd').value;
      const err   = document.getElementById('erreur');
      err.style.display = 'none';

      if (!email || !pwd) {
        err.textContent = 'Remplis tous les champs';
        err.style.display = 'block';
        return;
      }

      const res  = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pwd })
      });
      const json = await res.json();
      if (json.ok) {
        window.location.href = '/dashboard';
      } else {
        err.textContent = json.message || 'Erreur de connexion';
        err.style.display = 'block';
      }
    }
  </script>
</body>
</html>
